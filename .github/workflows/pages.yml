# Deploy the companion site (site/) to GitHub Pages.
#
# Why not use the built-in Pages "branch+folder" source? It only supports
# `/` and `/docs`, but our site lives at `/site`. This workflow uploads
# `site/` as the Pages artifact on every push to main.
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      # Only rebuild when site contents or this workflow change.
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Run one deployment at a time; cancel earlier in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
